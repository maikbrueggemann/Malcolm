    # mms.log
    # varlist_attributes.zeek (https://github.com/DINA-community/icsnpp-mms)

    if ("_jsonparsesuccess" not in [tags]) {
      dissect {
        id => "dissect_zeek_mms"
        mapping => {
          "[message]" => "%{[zeek_cols][ts]}	%{[zeek_cols][uid]}	%{[zeek_cols][orig_h]}	%{[zeek_cols][orig_p]}	%{[zeek_cols][resp_h]}	%{[zeek_cols][resp_p]}	%{[zeek_cols][devicevendor]}	%{[zeek_cols][devicemodel]}	%{[zeek_cols][devicerevision]}	%{[zeek_cols][protocolversion]}	%{[zeek_cols][parametercbb]}	%{[zeek_cols][servicessupported]}"
        }
      }

      if ("_dissectfailure" in [tags]) {
        mutate {
          id => "mutate_split_zeek_mms"
          split => { "[message]" => "	" }
        }
        ruby {
          id => "ruby_zip_zeek_mms"
          init => "@zeek_mms_field_names = [ 'ts', 'uid', 'orig_h', 'orig_p', 'resp_h', 'resp_p', 'devicevendor', 'devicemodel', 'devicerevision', 'protocolversion', 'parametercbb', 'servicessupported' ]"
          code => "event.set('[zeek_cols]', @zeek_mms_field_names.zip(event.get('[message]')).to_h)"
        }
      }
    }

    mutate {
      id => "mutate_add_fields_zeek_mms"
      add_field => {
        "[zeek_cols][proto]" => "tcp"
        "[zeek_cols][service]" => "mms"
      }
      add_tag => [ "ics" ]
    }
  }


