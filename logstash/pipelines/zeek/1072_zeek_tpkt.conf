filter {

  if ([log_source] == "tpkt") {
    #############################################################################################################################
    # tpkt.log
    # main.zeek (https://github.com/DINA-community/icsnpp-tpkt)

    if ("_jsonparsesuccess" not in [tags]) {
      dissect {
        id => "dissect_zeek_tpkt"
        mapping => {
          "[message]" => "%{[zeek_cols][ts]}	%{[zeek_cols][uid]}	%{[zeek_cols][orig_h]}	%{[zeek_cols][orig_p]}	%{[zeek_cols][resp_h]}	%{[zeek_cols][resp_p]}	%{[zeek_cols][bytes_orig]}	%{[zeek_cols][bytes_resp]}	%{[zeek_cols][packets_orig]}	%{[zeek_cols][packets_resp]}"
        }
      }

      if ("_dissectfailure" in [tags]) {
        mutate {
          id => "mutate_split_zeek_tpkt"
          split => { "[message]" => "	" }
        }
        ruby {
          id => "ruby_zip_zeek_tpkt"
          init => "@zeek_tpkt_field_names = [ 'ts', 'uid', 'orig_h', 'orig_p', 'resp_h', 'resp_p', 'bytes_orig', 'bytes_resp', 'packets_orig', 'packets_resp' ]"
          code => "event.set('[zeek_cols]', @zeek_tpkt_field_names.zip(event.get('[message]')).to_h)"
        }
      }
    }

    mutate {
      id => "mutate_add_fields_zeek_tpkt"
      add_field => {
        "[zeek_cols][proto]" => "tcp"
        "[zeek_cols][service]" => "tpkt"
      }
      add_tag => [ "ics" ]
    }
  }

}

