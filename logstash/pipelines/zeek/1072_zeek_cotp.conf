filter {

  if ([log_source] == "cotp_conn") {
    #############################################################################################################################
    # cotp_conn.log
    # main.zeek (https://github.com/DINA-community/icsnpp-cotp)

    if ("_jsonparsesuccess" not in [tags]) {
      dissect {
        id => "dissect_zeek_cotp_conn"
        mapping => {
          "[message]" => "%{[zeek_cols][ts]}	%{[zeek_cols][uid]}	%{[zeek_cols][orig_h]}	%{[zeek_cols][orig_p]}	%{[zeek_cols][resp_h]}	%{[zeek_cols][resp_p]}	%{[zeek_cols][bytes_orig]}	%{[zeek_cols][bytes_resp]}	%{[zeek_cols][packets_orig]}	%{[zeek_cols][packets_resp]}	%{[zeek_cols][calling_tsap]}	%{[zeek_cols][called_tsap]}	%{[zeek_cols][class]}	%{[zeek_cols][has_connect]}	%{[zeek_cols][has_disconnect]}	%{[zeek_cols][error]}	%{[zeek_cols][reject_cause]}"
        }
      }

      if ("_dissectfailure" in [tags]) {
        mutate {
          id => "mutate_split_zeek_cotp_conn"
          split => { "[message]" => "	" }
        }
        ruby {
          id => "ruby_zip_zeek_cotp_conn"
          init => "@zeek_cotp_conn_field_names = [ 'ts', 'uid', 'orig_h', 'orig_p', 'resp_h', 'resp_p', 'bytes_orig', 'bytes_resp', 'packets_orig', 'packets_resp', 'calling_tsap', 'called_tsap', 'class', 'has_connect', 'has_disconnect', 'error', 'reject_cause' ]"
          code => "event.set('[zeek_cols]', @zeek_cotp_conn_field_names.zip(event.get('[message]')).to_h)"
        }
      }
    }

    mutate {
      id => "mutate_add_fields_zeek_cotp_conn"
      add_field => {
        "[zeek_cols][proto]" => "tcp"
        "[zeek_cols][service]" => "cotp"
      }
      add_tag => [ "ics" ]
    }
  }

}

