filter {

  if ([log_source] == "pres") {
    #############################################################################################################################
    # pres.log
    # main.zeek (https://github.com/DINA-community/icsnpp-pres)

    if ("_jsonparsesuccess" not in [tags]) {
      dissect {
        id => "dissect_zeek_pres"
        mapping => {
          "[message]" => "%{[zeek_cols][ts]}	%{[zeek_cols][uid]}	%{[zeek_cols][orig_h]}	%{[zeek_cols][orig_p]}	%{[zeek_cols][resp_h]}	%{[zeek_cols][resp_p]}	%{[zeek_cols][bytes_orig]}	%{[zeek_cols][bytes_resp]}	%{[zeek_cols][packets_orig]}	%{[zeek_cols][packets_resp]}	%{[zeek_cols][refused]}	%{[zeek_cols][refuse_reason]}	%{[zeek_cols][aborted]}	%{[zeek_cols][abort_reason]}	%{[zeek_cols][cids]}"
        }
      }

      if ("_dissectfailure" in [tags]) {
        mutate {
          id => "mutate_split_zeek_pres"
          split => { "[message]" => "	" }
        }
        ruby {
          id => "ruby_zip_zeek_pres"
          init => "@zeek_pres_field_names = [ 'ts', 'uid', 'orig_h', 'orig_p', 'resp_h', 'resp_p', 'bytes_orig', 'bytes_resp', 'packets_orig', 'packets_resp', 'refused', 'refuse_reason', 'aborted', 'abort_reason', 'cids' ]"
          code => "event.set('[zeek_cols]', @zeek_pres_field_names.zip(event.get('[message]')).to_h)"
        }
      }
    }

    mutate {
      id => "mutate_add_fields_zeek_pres"
      add_field => {
        "[zeek_cols][proto]" => "tcp"
        "[zeek_cols][service]" => "pres"
      }
      add_tag => [ "ics" ]
    }
  }

}

