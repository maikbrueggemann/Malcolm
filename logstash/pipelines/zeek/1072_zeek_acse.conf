filter {

  if ([log_source] == "acse") {
    #############################################################################################################################
    # acse.log
    # main.zeek (https://github.com/DINA-community/icsnpp-acse)

    if ("_jsonparsesuccess" not in [tags]) {
      dissect {
        id => "dissect_zeek_acse"
        mapping => {
          "[message]" => "%{[zeek_cols][ts]}	%{[zeek_cols][uid]}	%{[zeek_cols][orig_h]}	%{[zeek_cols][orig_p]}	%{[zeek_cols][resp_h]}	%{[zeek_cols][resp_p]}	%{[zeek_cols][context_name]}	%{[zeek_cols][calling_ap_title]}	%{[zeek_cols][called_ap_title]}	%{[zeek_cols][auth_mechanism]}	%{[zeek_cols][auth_failure]}	%{[zeek_cols][result]}	%{[zeek_cols][aborted]}	%{[zeek_cols][diag]}"
        }
      }

      if ("_dissectfailure" in [tags]) {
        mutate {
          id => "mutate_split_zeek_acse"
          split => { "[message]" => "	" }
        }
        ruby {
          id => "ruby_zip_zeek_acse"
          init => "@zeek_acse_field_names = [ 'ts', 'uid', 'orig_h', 'orig_p', 'resp_h', 'resp_p', 'context_name', 'calling_ap_title', 'called_ap_title', 'auth_mechanism', 'auth_failure', 'result', 'aborted', 'diag' ]"
          code => "event.set('[zeek_cols]', @zeek_acse_field_names.zip(event.get('[message]')).to_h)"
        }
      }
    }

    mutate {
      id => "mutate_add_fields_zeek_acse"
      add_field => {
        "[zeek_cols][proto]" => "tcp"
        "[zeek_cols][service]" => "acse"
      }
      add_tag => [ "ics" ]
    }
  }

}

